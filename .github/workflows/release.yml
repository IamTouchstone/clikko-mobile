name: CI and Release

on:
push:
branches:
- main
tags:
- "v*"

permissions:
contents: write

env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
validate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Setup Node
    uses: actions/setup-node@v5
    with:
      node-version: 24
      cache: npm

  - name: Install Dependencies
    run: npm ci

  - name: Lint
    run: npm run lint

  - name: Typecheck
    run: npm run typecheck
```

release:
needs: validate
if: startsWith(github.ref, 'refs/tags/v')
runs-on: ubuntu-latest

```
env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Setup Node
    uses: actions/setup-node@v5
    with:
      node-version: 24
      cache: npm

  - name: Install Dependencies
    run: npm ci

  - name: Install EAS CLI
    run: npm install -g eas-cli

  - name: Verify Expo Login
    run: eas whoami

  - name: Build APK
    run: |
      eas build \
        --platform android \
        --profile preview \
        --non-interactive \
        --wait

  - name: Build AAB
    run: |
      eas build \
        --platform android \
        --profile production \
        --non-interactive \
        --wait

  - name: Download APK
    run: |
      APK_URL=$(eas build:list \
        --platform android \
        --profile preview \
        --status finished \
        --limit 1 \
        --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.apk' | head -1)

      echo "APK URL: $APK_URL"

      if [ -z "$APK_URL" ]; then
        echo "::error::APK URL not found"
        exit 1
      fi

      curl -L "$APK_URL" \
        -o "clikko-${{ github.ref_name }}.apk"

  - name: Download AAB
    run: |
      AAB_URL=$(eas build:list \
        --platform android \
        --profile production \
        --status finished \
        --limit 1 \
        --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.aab' | head -1)

      echo "AAB URL: $AAB_URL"

      if [ -z "$AAB_URL" ]; then
        echo "::error::AAB URL not found"
        exit 1
      fi

      curl -L "$AAB_URL" \
        -o "clikko-${{ github.ref_name }}.aab"

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      generate_release_notes: true
      files: |
        clikko-${{ github.ref_name }}.apk
        clikko-${{ github.ref_name }}.aab
```
