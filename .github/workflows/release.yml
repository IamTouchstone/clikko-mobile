name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify Expo Login
        run: eas whoami

      - name: Build APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

      - name: Build AAB
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait

      - name: Get APK URL
        id: apk
        run: |
          APK_URL=$(eas build:list \
            --platform android \
            --limit 20 \
            --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.apk' | head -1)

          echo "url=$APK_URL" >> $GITHUB_OUTPUT

          test -n "$APK_URL"

      - name: Get AAB URL
        id: aab
        run: |
          AAB_URL=$(eas build:list \
            --platform android \
            --limit 20 \
            --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.aab' | head -1)

          echo "url=$AAB_URL" >> $GITHUB_OUTPUT

          test -n "$AAB_URL"

      - name: Download APK
        run: |
          curl -L "${{ steps.apk.outputs.url }}" \
          -o "clikko-${{ github.ref_name }}.apk"

          test -f "clikko-${{ github.ref_name }}.apk"

      - name: Download AAB
        run: |
          curl -L "${{ steps.aab.outputs.url }}" \
          -o "clikko-${{ github.ref_name }}.aab"

          test -f "clikko-${{ github.ref_name }}.aab"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clikko-${{ github.ref_name }}.apk
            clikko-${{ github.ref_name }}.aab
