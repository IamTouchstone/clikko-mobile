name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      is-release: ${{ steps.release_check.outputs.is_release }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Detect Release Tag
        id: release_check
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: validate
    if: needs.validate.outputs.is-release == 'true'
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is missing"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Build Android APK
        run: |
          set -e

          echo "Starting APK build..."

          npx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

          echo "APK build completed"

      - name: Build Android AAB
        run: |
          set -e

          echo "Starting AAB build..."

          npx eas-cli build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait

          echo "AAB build completed"

      - name: Fetch Latest APK URL
        id: apk
        run: |
          set -e

          JSON=$(npx eas-cli build:list \
            --platform android \
            --limit 50 \
            --json 2>/dev/null)

          APK_URL=$(echo "$JSON" | jq -r '
            map(
              select(
                .status == "finished" and
                .buildProfile == "preview"
              )
            )
            | sort_by(.createdAt)
            | reverse
            | .[0].artifacts.applicationArchiveUrl
          ')

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "::error::Unable to retrieve APK URL"
            exit 1
          fi

          echo "APK URL:"
          echo "$APK_URL"

          echo "url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Fetch Latest AAB URL
        id: aab
        run: |
          set -e

          JSON=$(npx eas-cli build:list \
            --platform android \
            --limit 50 \
            --json 2>/dev/null)

          AAB_URL=$(echo "$JSON" | jq -r '
            map(
              select(
                .status == "finished" and
                .buildProfile == "production"
              )
            )
            | sort_by(.createdAt)
            | reverse
            | .[0].artifacts.applicationArchiveUrl
          ')

          if [ -z "$AAB_URL" ] || [ "$AAB_URL" = "null" ]; then
            echo "::error::Unable to retrieve AAB URL"
            exit 1
          fi

          echo "AAB URL:"
          echo "$AAB_URL"

          echo "url=$AAB_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          set -e

          curl -fL \
            "${{ steps.apk.outputs.url }}" \
            -o "clikko-${{ github.ref_name }}.apk"

          if [ ! -f "clikko-${{ github.ref_name }}.apk" ]; then
            echo "::error::APK download failed"
            exit 1
          fi

          ls -lh

      - name: Download AAB
        run: |
          set -e

          curl -fL \
            "${{ steps.aab.outputs.url }}" \
            -o "clikko-${{ github.ref_name }}.aab"

          if [ ! -f "clikko-${{ github.ref_name }}.aab" ]; then
            echo "::error::AAB download failed"
            exit 1
          fi

          ls -lh

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clikko-${{ github.ref_name }}.apk
            clikko-${{ github.ref_name }}.aab