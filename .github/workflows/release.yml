name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      is-release: ${{ steps.check-tag.outputs.is-release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check if release tag
        id: check-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: validate
    if: needs.validate.outputs.is-release == 'true'
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Build APK
        run: |
          set -e

          npx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

      - name: Build AAB
        run: |
          set -e

          npx eas-cli build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait

      - name: Get APK URL
        id: apk
        run: |
          set -e

          APK_URL=$(npx eas-cli build:list \
            --platform android \
            --limit 20 \
            --json \
            | jq -r '[.[] | select(.buildProfile=="preview" and .status=="FINISHED")][0].artifacts.applicationArchiveUrl')

          echo "url=$APK_URL" >> "$GITHUB_OUTPUT"

          echo "APK URL:"
          echo "$APK_URL"

          test -n "$APK_URL"
          test "$APK_URL" != "null"

      - name: Get AAB URL
        id: aab
        run: |
          set -e

          AAB_URL=$(npx eas-cli build:list \
            --platform android \
            --limit 20 \
            --json \
            | jq -r '[.[] | select(.buildProfile=="production" and .status=="FINISHED")][0].artifacts.applicationArchiveUrl')

          echo "url=$AAB_URL" >> "$GITHUB_OUTPUT"

          echo "AAB URL:"
          echo "$AAB_URL"

          test -n "$AAB_URL"
          test "$AAB_URL" != "null"

      - name: Download APK
        run: |
          set -e

          curl -L \
            "${{ steps.apk.outputs.url }}" \
            -o "clikko-${{ github.ref_name }}.apk"

          ls -lah

      - name: Download AAB
        run: |
          set -e

          curl -L \
            "${{ steps.aab.outputs.url }}" \
            -o "clikko-${{ github.ref_name }}.aab"

          ls -lah

      - name: Verify Files
        run: |
          test -f "clikko-${{ github.ref_name }}.apk"
          test -f "clikko-${{ github.ref_name }}.aab"

      - name: Upload APK and AAB to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clikko-${{ github.ref_name }}.apk
            clikko-${{ github.ref_name }}.aab