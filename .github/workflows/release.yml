      - name: Install Dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify Expo Authentication
        run: eas whoami

      - name: Build APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

      - name: Build AAB
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait

      - name: Get APK URL
        id: apk
        run: |
          APK_URL=$(eas build:list \
            --platform android \
            --profile preview \
            --status finished \
            --limit 1 \
            --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.apk' | head -1)

          echo "APK_URL=$APK_URL"
          echo "url=$APK_URL" >> $GITHUB_OUTPUT

          if [ -z "$APK_URL" ]; then
            echo "::error::APK URL not found"
            exit 1
          fi

      - name: Get AAB URL
        id: aab
        run: |
          AAB_URL=$(eas build:list \
            --platform android \
            --profile production \
            --status finished \
            --limit 1 \
            --non-interactive | grep -o 'https://expo.dev/artifacts/eas/[^ ]*\.aab' | head -1)

          echo "AAB_URL=$AAB_URL"
          echo "url=$AAB_URL" >> $GITHUB_OUTPUT

          if [ -z "$AAB_URL" ]; then
            echo "::error::AAB URL not found"
            exit 1
          fi

      - name: Download APK
        run: |
          curl -L "${{ steps.apk.outputs.url }}" \
          -o "clikko-${{ github.ref_name }}.apk"

          test -f "clikko-${{ github.ref_name }}.apk"

      - name: Download AAB
        run: |
          curl -L "${{ steps.aab.outputs.url }}" \
          -o "clikko-${{ github.ref_name }}.aab"

          test -f "clikko-${{ github.ref_name }}.aab"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clikko-${{ github.ref_name }}.apk
            clikko-${{ github.ref_name }}.aab
